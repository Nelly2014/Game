<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fruit Catcher 🍎</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0f0c29;
    --bg2:       #1a1640;
    --card:      #231f50;
    --gold:      #ffd86e;
    --orange:    #ff8c42;
    --pink:      #ff4d8d;
    --teal:      #00d4aa;
    --red:       #ff4757;
    --white:     #ffffff;
    --muted:     rgba(255,255,255,0.45);
    --radius:    16px;
    --shadow:    0 8px 32px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--white);
    overflow: hidden;
  }

  /* ── Stars background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 30%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 95%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  #root {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 12px;
    gap: 10px;
  }

  /* ── Title ── */
  #title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--gold), var(--orange), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1;
  }

  /* ── HUD ── */
  #hud {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 480px;
  }
  .hud-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 6px 14px;
    display: flex; flex-direction: column; align-items: center;
    min-width: 80px;
    box-shadow: var(--shadow);
  }
  .hud-label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
  }
  .hud-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; line-height: 1.2;
    color: var(--gold);
  }
  #livesVal { font-size: 1rem; letter-spacing: 2px; }

  /* ── Canvas wrapper ── */
  #canvasWrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.08), var(--shadow);
  }
  canvas {
    display: block;
    cursor: none;
    touch-action: none;
  }

  /* ── Overlay (start / pause / gameover) ── */
  #overlay {
    position: absolute; inset: 0;
    background: rgba(10,8,40,0.82);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    backdrop-filter: blur(4px);
    border-radius: var(--radius);
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    background: linear-gradient(135deg, var(--gold), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    padding: 0 16px;
  }
  #overlay-sub {
    font-size: .95rem; color: var(--muted);
    text-align: center; padding: 0 24px; line-height: 1.5;
  }
  #overlay-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; color: var(--teal);
  }

  /* ── Buttons ── */
  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem; letter-spacing: .5px;
    border: none; border-radius: 50px;
    padding: 10px 32px; cursor: pointer;
    transition: transform .12s, filter .12s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .btn:hover  { transform: translateY(-2px); filter: brightness(1.1); }
  .btn:active { transform: translateY(0);    filter: brightness(.95); }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--pink)); color: #fff; }
  .btn-ghost   { background: rgba(255,255,255,0.1); color: var(--white); border: 1px solid rgba(255,255,255,0.2); }

  /* ── Difficulty row ── */
  #diffRow {
    display: flex; gap: 8px; align-items: center;
    font-size: 13px; color: var(--muted); flex-wrap: wrap; justify-content: center;
  }
  .diff-btn {
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 12px; padding: 4px 14px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .diff-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }
  .diff-btn.active { background: var(--teal); color: #0f0c29; border-color: var(--teal); font-weight: 800; }

  /* ── Control row ── */
  #ctrlRow { display: flex; gap: 8px; }

  /* ── Hint ── */
  #hint {
    font-size: 11px; color: var(--muted); text-align: center;
    max-width: 400px; line-height: 1.5;
  }

  /* ── Mobile tweaks ── */
  @media (max-height: 700px) {
    #title { font-size: 1.4rem; }
    .hud-val { font-size: 1.1rem; }
    #root { gap: 6px; padding: 6px; }
  }
</style>
</head>
<body>
<div id="root">
  <div id="title">🍎 Fruit Catcher</div>

  <div id="hud">
    <div class="hud-card"><div class="hud-label">Score</div><div class="hud-val" id="scoreVal">0</div></div>
    <div class="hud-card"><div class="hud-label">Level</div><div class="hud-val" id="levelVal">1</div></div>
    <div class="hud-card"><div class="hud-label">Lives</div><div class="hud-val" id="livesVal">❤❤❤</div></div>
    <div class="hud-card"><div class="hud-label">Best</div><div class="hud-val" id="bestVal">0</div></div>
  </div>

  <div id="canvasWrap">
    <canvas id="canvas"></canvas>

    <div id="overlay">
      <div id="overlay-title">Fruit Catcher 🍓</div>
      <div id="overlay-sub">Move your mouse or finger to catch falling fruit.<br/>Dodge the bombs 💣 or lose a life!</div>
      <div id="overlay-score" style="display:none"></div>
      <button class="btn btn-primary" id="startBtn">▶ Start Game</button>
    </div>
  </div>

  <div id="ctrlRow">
    <button class="btn btn-ghost" id="pauseBtn" disabled>⏸ Pause</button>
  </div>

  <div id="diffRow">
    Difficulty:
    <button class="diff-btn active" data-d="1">Easy</button>
    <button class="diff-btn" data-d="2">Medium</button>
    <button class="diff-btn" data-d="3">Hard</button>
  </div>

  <div id="hint">Mouse / touch to move basket &nbsp;·&nbsp; Catch fruit for points &nbsp;·&nbsp; Levels speed up!</div>
</div>

<script>
(function(){
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const oTitle  = document.getElementById('overlay-title');
  const oSub    = document.getElementById('overlay-sub');
  const oScore  = document.getElementById('overlay-score');
  const startBtn= document.getElementById('startBtn');
  const pauseBtn= document.getElementById('pauseBtn');

  /* ── Sizing ── */
  let W, H, scale;
  const BASE_W = 480, BASE_H = 520;

  function resize() {
    const maxW = Math.min(window.innerWidth  - 24, BASE_W);
    const maxH = Math.min(window.innerHeight - 200, BASE_H);
    scale = Math.min(maxW / BASE_W, maxH / BASE_H, 1);
    W = Math.round(BASE_W * scale);
    H = Math.round(BASE_H * scale);
    canvas.width  = W;
    canvas.height = H;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => { if(state !== 'playing') resize(); });

  /* ── Constants ── */
  const BW = 82, BH = 20;
  const FRUITS = [
    {e:'🍎',pts:10},{e:'🍊',pts:15},{e:'🍋',pts:20},
    {e:'🍇',pts:25},{e:'🍓',pts:30},{e:'🍑',pts:20},
    {e:'🥝',pts:35},{e:'⭐',pts:50},{e:'💎',pts:80}
  ];

  /* ── State ── */
  let state = 'idle';   // idle | playing | paused | over
  let score, lives, level, frame;
  let basketX, targetX;
  let items, particles, popups;
  let spawnInterval, fallSpeed, bombChance;
  let diff = 1;
  let best = +localStorage.getItem('fc2_best') || 0;
  let animId;

  /* ── Difficulty ── */
  function applyDiff(d) {
    diff = d;
    spawnInterval = [0, 38, 28, 20][d];
    fallSpeed     = [0, 1.6, 2.4, 3.2][d];
    bombChance    = [0, 0.10, 0.16, 0.22][d];
    document.querySelectorAll('.diff-btn').forEach(b =>
      b.classList.toggle('active', +b.dataset.d === d));
  }
  applyDiff(1);

  /* ── HUD ── */
  function hud() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('levelVal').textContent = level;
    document.getElementById('bestVal').textContent  = best;
    const h = document.getElementById('livesVal');
    h.textContent = '❤'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
  }

  /* ── Start ── */
  function startGame() {
    score = 0; lives = 3; level = 1; frame = 0;
    basketX = targetX = (BASE_W - BW) / 2;
    items = []; particles = []; popups = [];
    applyDiff(diff);
    state = 'playing';
    overlay.classList.add('hidden');
    startBtn.textContent = '↺ Restart';
    pauseBtn.disabled = false;
    document.querySelectorAll('.diff-btn').forEach(b => b.disabled = true);
    hud();
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
  }

  /* ── Pause ── */
  function togglePause() {
    if (state === 'playing') {
      state = 'paused';
      pauseBtn.textContent = '▶ Resume';
      oTitle.textContent = '⏸ Paused';
      oSub.textContent   = 'Take a breather...';
      oSub.style.display = 'block';
      oScore.style.display = 'none';
      startBtn.style.display = 'none';
      overlay.classList.remove('hidden');
    } else if (state === 'paused') {
      state = 'playing';
      pauseBtn.textContent = '⏸ Pause';
      overlay.classList.add('hidden');
      startBtn.style.display = '';
      animId = requestAnimationFrame(loop);
    }
  }

  /* ── End ── */
  function endGame() {
    state = 'over';
    if (score > best) { best = score; localStorage.setItem('fc2_best', best); }
    pauseBtn.disabled = true;
    pauseBtn.textContent = '⏸ Pause';
    document.querySelectorAll('.diff-btn').forEach(b => b.disabled = false);
    oTitle.textContent = '💀 Game Over!';
    oSub.textContent   = 'Better luck next time!';
    oSub.style.display = 'block';
    oScore.textContent = `Score: ${score}   ·   Best: ${best}`;
    oScore.style.display = 'block';
    startBtn.textContent = '↺ Play Again';
    startBtn.style.display = '';
    overlay.classList.remove('hidden');
    hud();
  }

  /* ── Spawner ── */
  function spawnItem() {
    const bomb = Math.random() < bombChance;
    const x = 24 + Math.random() * (BASE_W - 48);
    const spd = fallSpeed * (0.8 + Math.random() * 0.5);
    if (bomb) {
      items.push({ x, y: -20, r: 16, bomb: true, speed: spd, rot: 0, rs: (Math.random()-.5)*.1 });
    } else {
      const f = FRUITS[Math.floor(Math.random() * FRUITS.length)];
      items.push({ x, y: -20, r: 15, bomb: false, emoji: f.e, pts: f.pts, speed: spd, rot: 0, rs: (Math.random()-.5)*.05 });
    }
  }

  /* ── Particles ── */
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 5;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life: 1, color, r: 2 + Math.random()*3 });
    }
  }

  /* ── Drawing helpers ── */
  function drawStarfield() {
    ctx.fillStyle = '#0f0c29';
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    /* faint grid lines */
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let y = 0; y < BASE_H; y += BASE_H/6) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(BASE_W,y); ctx.stroke();
    }
    /* bottom grass strip */
    ctx.fillStyle = 'rgba(0, 180, 100, 0.12)';
    ctx.fillRect(0, BASE_H - 28, BASE_W, 28);
    ctx.fillStyle = 'rgba(0, 220, 120, 0.2)';
    ctx.fillRect(0, BASE_H - 6, BASE_W, 6);
  }

  function drawBasket(bx) {
    const by = BASE_H - 50;
    /* shadow */
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(bx + BW/2, by + BH + 4, BW/2, 5, 0, 0, Math.PI*2);
    ctx.fill();
    /* body */
    const g = ctx.createLinearGradient(bx, by, bx+BW, by+BH);
    g.addColorStop(0,   '#ffd86e');
    g.addColorStop(0.5, '#ff8c42');
    g.addColorStop(1,   '#e65100');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(bx + 8, by);
    ctx.lineTo(bx + BW - 8, by);
    ctx.lineTo(bx + BW, by + BH);
    ctx.lineTo(bx, by + BH);
    ctx.closePath();
    ctx.fill();
    /* rim */
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(bx + 4, by, BW - 8, 4);
    /* weave lines */
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const rx = bx + i * (BW/4);
      ctx.beginPath();
      ctx.moveTo(rx, by);
      ctx.lineTo(rx + 3, by + BH);
      ctx.stroke();
    }
  }

  function drawItems() {
    items.forEach(it => {
      ctx.save();
      ctx.translate(it.x, it.y);
      ctx.rotate(it.rot);
      ctx.font = `${it.r * 2}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(it.bomb ? '💣' : it.emoji, 0, 0);
      ctx.restore();
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawPopups() {
    popups.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.font = `700 ${p.size}px 'Fredoka One', cursive`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    });
  }

  function drawLevelBanner() {
    if (!levelBanner || levelBanner.life <= 0) return;
    const a = Math.min(1, levelBanner.life);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    roundRect(ctx, BASE_W/2 - 100, BASE_H/2 - 26, 200, 52, 14);
    ctx.fill();
    ctx.fillStyle = '#00d4aa';
    ctx.font = "700 22px 'Fredoka One', cursive";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`⬆ Level ${level}!`, BASE_W/2, BASE_H/2);
    ctx.restore();
    levelBanner.life -= 0.018;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }

  /* ── Level-up banner state ── */
  let levelBanner = null;

  /* ── Collision ── */
  function hits(it, bx) {
    const by = BASE_H - 50;
    return it.y + it.r > by && it.y - it.r < by + BH &&
           it.x > bx - 6    && it.x < bx + BW + 6;
  }

  /* ── Main loop ── */
  let lastT = 0;
  function loop(ts) {
    if (state !== 'playing') return;
    const dt = Math.min(ts - lastT, 50);
    lastT = ts;
    frame++;

    /* move basket */
    basketX += (targetX - BW/2 - basketX) * 0.2;
    basketX = Math.max(0, Math.min(BASE_W - BW, basketX));

    /* spawn */
    if (frame % spawnInterval === 0) spawnItem();

    /* level up */
    const thresholds = [0, 200, 500, 900, 1500, 99999];
    if (level < 5 && score >= thresholds[level]) {
      level++;
      fallSpeed  += 0.35;
      spawnInterval = Math.max(10, spawnInterval - 3);
      levelBanner = { life: 1 };
      hud();
    }

    /* update items */
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y   += it.speed * (dt / 16);
      it.rot += it.rs;

      if (hits(it, basketX)) {
        if (it.bomb) {
          lives--;
          burst(it.x, it.y, '#ff4757', 16);
          popups.push({ x: it.x, y: it.y - 20, text: '-1 ❤', color: '#ff4757', size: 18, life: 1 });
          if (lives <= 0) { items.splice(i,1); endGame(); return; }
        } else {
          const gained = it.pts * level;
          score += gained;
          burst(it.x, it.y, '#ffd86e', 10);
          popups.push({ x: it.x, y: it.y - 20, text: `+${gained}`, color: '#00d4aa', size: 16, life: 1 });
        }
        items.splice(i, 1);
        hud();
      } else if (it.y > BASE_H + 24) {
        if (!it.bomb) {
          lives--;
          hud();
          if (lives <= 0) { items.splice(i,1); endGame(); return; }
        }
        items.splice(i, 1);
      }
    }

    /* update particles */
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.18;
      p.life -= 0.04;
      if (p.life <= 0) particles.splice(i, 1);
    }

    /* update popups */
    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.y   -= 1.2;
      p.life -= 0.025;
      if (p.life <= 0) popups.splice(i, 1);
    }

    /* draw */
    drawStarfield();
    drawItems();
    drawParticles();
    drawBasket(basketX);
    drawPopups();
    drawLevelBanner();

    animId = requestAnimationFrame(loop);
  }

  /* ── Input ── */
  function setTarget(clientX) {
    const rect = canvas.getBoundingClientRect();
    const cssX  = clientX - rect.left;
    targetX = (cssX / rect.width) * BASE_W;
  }

  canvas.addEventListener('mousemove',  e => setTarget(e.clientX));
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); setTarget(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener('touchstart', e => setTarget(e.touches[0].clientX));

  /* ── Buttons ── */
  startBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);

  document.querySelectorAll('.diff-btn').forEach(b => {
    b.addEventListener('click', () => applyDiff(+b.dataset.d));
  });

  /* ── Initial idle frame ── */
  function idleFrame() {
    drawStarfield();
    if (state === 'idle' || state === 'over') requestAnimationFrame(idleFrame);
  }
  idleFrame();
  hud();

})();
</script>
</body>
</html>
